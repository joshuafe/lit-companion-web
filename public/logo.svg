<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Warmer cream desk -->
    <radialGradient id="deskGlow" cx="50%" cy="55%" r="72%">
      <stop offset="0%" stop-color="#FBF6E9"/>
      <stop offset="100%" stop-color="#E9DDC3"/>
    </radialGradient>
    <linearGradient id="paperEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F3EAD4"/>
    </linearGradient>
    <!-- Slightly warmer accent for ink lines -->
    <linearGradient id="inkWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C06844"/>
      <stop offset="100%" stop-color="#A85A38"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#deskGlow)"/>

  <!-- Faint secondary coffee splat, far top-right -->
  <g opacity="0.2">
    <circle cx="432" cy="92" r="10" fill="#C06844"/>
    <circle cx="450" cy="108" r="3" fill="#C06844"/>
    <circle cx="422" cy="112" r="2" fill="#C06844"/>
  </g>

  <!-- Crumpled paper ball, bottom-right -->
  <g transform="translate(412 400)" opacity="0.9">
    <path d="M 0 20 Q -8 4 6 -4 Q 16 -18 34 -10 Q 52 -14 58 4 Q 70 14 60 30 Q 52 46 32 44 Q 14 50 4 38 Q -6 30 0 20 Z"
          fill="url(#paperEdge)" stroke="#2E2A24" stroke-width="2"/>
    <!-- crumple creases -->
    <path d="M 8 12 L 28 22 M 20 2 L 32 28 M 44 6 L 40 32 M 52 18 L 34 38"
          stroke="#2E2A24" stroke-width="1.2" opacity="0.45" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Main coffee ring, half-hidden under papers -->
  <g opacity="0.4">
    <circle cx="118" cy="378" r="48" fill="none" stroke="#C06844" stroke-width="7"/>
    <circle cx="118" cy="378" r="48" fill="none" stroke="#2E2A24" stroke-width="1.5" opacity="0.25"/>
    <circle cx="162" cy="360" r="3" fill="#C06844"/>
    <circle cx="78" cy="412" r="2" fill="#C06844"/>
  </g>

  <!-- ─────────── BACK paper: alpha-helix sketch ─────────── -->
  <g transform="translate(108 138) rotate(-14)">
    <rect x="0" y="0" width="244" height="310" rx="10" fill="url(#paperEdge)"
          stroke="#2E2A24" stroke-width="2.5" opacity="0.88"/>
    <!-- title -->
    <rect x="22" y="30" width="138" height="9" rx="2" fill="#2E2A24" opacity="0.78"/>
    <rect x="22" y="50" width="88"  height="4" rx="1" fill="#7D7266"/>

    <!-- hand-sketched alpha-helix cylinder: tilted stacked loops -->
    <g transform="translate(20 78)" stroke="#2E2A24" stroke-width="2.4" fill="none" stroke-linecap="round">
      <!-- cylinder body outlines -->
      <path d="M 18 4 Q 4 44 18 98 Q 14 154 22 196"/>
      <path d="M 182 6 Q 198 46 184 100 Q 200 156 184 198" opacity="0.85"/>
      <!-- helical turns (slanted ellipses) -->
      <path d="M 18 14 Q 100 -6 182 14"/>
      <path d="M 17 40 Q 100 20 183 40"/>
      <path d="M 18 66 Q 100 46 184 66"/>
      <path d="M 18 92 Q 100 72 184 92"/>
      <path d="M 18 118 Q 100 98 184 118"/>
      <path d="M 19 144 Q 100 124 184 144"/>
      <path d="M 20 170 Q 100 150 184 170"/>
      <path d="M 20 196 Q 100 176 184 196"/>
    </g>
    <!-- H-bond dots between turns -->
    <g transform="translate(118 88)" fill="#C06844" opacity="0.7">
      <circle cx="0" cy="0" r="2"/>
      <circle cx="0" cy="26" r="2"/>
      <circle cx="0" cy="52" r="2"/>
      <circle cx="0" cy="78" r="2"/>
      <circle cx="0" cy="104" r="2"/>
    </g>

    <!-- caption lines -->
    <rect x="22" y="294" width="150" height="3.5" rx="1.5" fill="#7D7266" opacity="0"/>
  </g>

  <!-- ─────────── MIDDLE paper: ribbon diagram + highlighter ─────────── -->
  <g transform="translate(158 166) rotate(5)">
    <rect x="0" y="0" width="240" height="304" rx="10" fill="url(#paperEdge)"
          stroke="#2E2A24" stroke-width="2.5"/>
    <!-- highlighter streak across title -->
    <rect x="16" y="24" width="186" height="18" rx="3" fill="#C06844" opacity="0.32"/>
    <rect x="22" y="30" width="168" height="10" rx="2" fill="#2E2A24"/>
    <rect x="22" y="52" width="110" height="5" rx="1.5" fill="#2E2A24" opacity="0.55"/>

    <!-- Body: protein ribbon sketch, sheets + helices + loops -->
    <g transform="translate(18 74)" fill="none" stroke-linecap="round">
      <!-- soft pocket blob for active site -->
      <path d="M 58 70 Q 86 48 130 62 Q 168 82 158 118 Q 132 146 90 132 Q 52 120 58 70 Z"
            fill="#C06844" opacity="0.14" stroke="none"/>
      <!-- helix ribbon 1 (top, running right) -->
      <path d="M 4 22 Q 22 4 42 18 Q 60 34 78 18 Q 98 4 116 20 Q 134 36 152 22"
            stroke="#2E2A24" stroke-width="3"/>
      <!-- helix hash marks -->
      <g stroke="#2E2A24" stroke-width="1.6" opacity="0.7">
        <line x1="10"  y1="24" x2="16"  y2="10"/>
        <line x1="28"  y1="14" x2="32"  y2="30"/>
        <line x1="50"  y1="28" x2="54"  y2="12"/>
        <line x1="70"  y1="14" x2="74"  y2="30"/>
        <line x1="92"  y1="26" x2="96"  y2="10"/>
        <line x1="114" y1="14" x2="118" y2="30"/>
        <line x1="134" y1="30" x2="138" y2="14"/>
      </g>
      <!-- loop connecting to beta sheet -->
      <path d="M 152 22 Q 176 34 172 56 Q 160 76 138 76" stroke="#2E2A24" stroke-width="2.6"/>
      <!-- beta-sheet arrow 1 -->
      <path d="M 138 74 L 60 74 L 60 68 L 46 82 L 60 96 L 60 90 L 138 90 Z"
            fill="#F3EAD4" stroke="#2E2A24" stroke-width="2.4"/>
      <!-- loop -->
      <path d="M 46 84 Q 16 96 22 124 Q 36 150 72 144" stroke="#2E2A24" stroke-width="2.6"/>
      <!-- beta-sheet arrow 2, warm -->
      <path d="M 72 142 L 150 142 L 150 136 L 166 150 L 150 164 L 150 158 L 72 158 Z"
            fill="url(#inkWarm)" stroke="#2E2A24" stroke-width="2.4" opacity="0.85"/>
      <!-- tail loop out -->
      <path d="M 166 150 Q 192 154 194 178" stroke="#2E2A24" stroke-width="2.6"/>
      <!-- active-site ligand dot -->
      <circle cx="102" cy="104" r="4" fill="#2E2A24"/>
      <line x1="102" y1="104" x2="96" y2="96" stroke="#2E2A24" stroke-width="1.4"/>
      <line x1="102" y1="104" x2="110" y2="96" stroke="#2E2A24" stroke-width="1.4"/>
      <line x1="102" y1="104" x2="108" y2="114" stroke="#2E2A24" stroke-width="1.4"/>
    </g>

    <!-- short caption -->
    <rect x="22" y="258" width="194" height="3.5" rx="1.5" fill="#7D7266"/>
    <rect x="22" y="270" width="170" height="3.5" rx="1.5" fill="#7D7266"/>
    <rect x="22" y="282" width="140" height="3.5" rx="1.5" fill="#7D7266"/>

    <!-- dog-eared corner -->
    <path d="M 240 0 L 208 0 L 240 32 Z" fill="#ECE0C8" stroke="#2E2A24" stroke-width="2.5"/>
    <!-- margin scribble -->
    <path d="M 222 182 Q 230 176 224 172 Q 216 170 218 180 Q 220 190 228 186"
          fill="none" stroke="#C06844" stroke-width="1.8" opacity="0.7"/>
  </g>

  <!-- Sticky note with a hand-drawn exclamation + scribble -->
  <g transform="translate(308 282) rotate(10)">
    <rect x="0" y="0" width="94" height="88" fill="#E8BE8F" stroke="#2E2A24" stroke-width="2"/>
    <!-- scribbled arrow -->
    <path d="M 14 20 Q 40 22 62 38" stroke="#2E2A24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 62 38 L 54 30 M 62 38 L 52 42" stroke="#2E2A24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Kd?! -->
    <text x="10" y="72" font-family="Georgia, serif" font-size="30" font-style="italic"
          font-weight="700" fill="#2E2A24">K_d?!</text>
  </g>

  <!-- ─────────── FRONT paper: scatter + fitted curve ─────────── -->
  <g transform="translate(218 226) rotate(12)">
    <rect x="0" y="0" width="214" height="264" rx="10" fill="url(#paperEdge)"
          stroke="#2E2A24" stroke-width="2.5"/>

    <!-- axes -->
    <g transform="translate(22 34)" stroke="#2E2A24" fill="none">
      <line x1="0" y1="104" x2="170" y2="104" stroke-width="2"/>
      <line x1="0" y1="0"   x2="0"   y2="104" stroke-width="2"/>

      <!-- sketchy fitted curve (binding isotherm-ish) -->
      <path d="M 2 102 Q 30 98 52 82 Q 78 50 118 28 Q 148 16 168 12"
            stroke="url(#inkWarm)" stroke-width="2.8" opacity="0.9"/>
      <!-- scatter points, slightly noisy -->
      <g fill="#2E2A24">
        <circle cx="8"   cy="98" r="3"/>
        <circle cx="22"  cy="96" r="3"/>
        <circle cx="36"  cy="88" r="3"/>
        <circle cx="50"  cy="84" r="3"/>
        <circle cx="66"  cy="68" r="3"/>
        <circle cx="82"  cy="54" r="3"/>
        <circle cx="98"  cy="42" r="3"/>
        <circle cx="118" cy="28" r="3"/>
        <circle cx="136" cy="20" r="3"/>
        <circle cx="156" cy="16" r="3"/>
      </g>
      <!-- tiny error bars on a couple -->
      <g stroke="#2E2A24" stroke-width="1.4" opacity="0.7">
        <line x1="50"  y1="78"  x2="50"  y2="90"/>
        <line x1="82"  y1="48"  x2="82"  y2="60"/>
        <line x1="118" y1="22"  x2="118" y2="34"/>
      </g>
      <!-- axis tick labels, casual -->
      <text x="-4" y="-4" font-family="Georgia, serif" font-size="11"
            font-style="italic" fill="#2E2A24" opacity="0.8">Δ</text>
      <text x="165" y="116" font-family="Georgia, serif" font-size="11"
            font-style="italic" fill="#2E2A24" opacity="0.8">[L]</text>
    </g>

    <!-- caption -->
    <rect x="22" y="160" width="170" height="6" rx="1.5" fill="#2E2A24"/>
    <rect x="22" y="176" width="90"  height="4" rx="1"  fill="#2E2A24" opacity="0.55"/>
    <rect x="22" y="198" width="168" height="3" rx="1"  fill="#7D7266"/>
    <rect x="22" y="210" width="156" height="3" rx="1"  fill="#7D7266"/>
    <rect x="22" y="222" width="172" height="3" rx="1"  fill="#7D7266"/>
    <rect x="22" y="234" width="140" height="3" rx="1"  fill="#7D7266"/>
  </g>

  <!-- Paperclip on front paper -->
  <g transform="translate(340 220) rotate(12)" fill="none" stroke="#2E2A24"
     stroke-width="3" stroke-linecap="round">
    <path d="M 0 0 L 0 48 Q 0 56 8 56 L 26 56 Q 34 56 34 48 L 34 8 Q 34 0 26 0 L 14 0 Q 6 0 6 8 L 6 44"/>
  </g>

  <!-- ─────────── Fountain pen (replaces pencil) ─────────── -->
  <g transform="translate(332 404) rotate(-22)">
    <!-- barrel -->
    <rect x="22" y="-1" width="108" height="14" rx="4"
          fill="#2E2A24" stroke="#2E2A24" stroke-width="1.5"/>
    <!-- barrel highlight -->
    <rect x="28" y="1" width="96" height="3" rx="1.5" fill="#FDFAF1" opacity="0.18"/>
    <!-- cap clip ring / trim -->
    <rect x="84" y="-2" width="6" height="16" fill="#C4A768"/>
    <!-- section (behind nib), terracotta -->
    <path d="M 22 0 L 8 2 L 2 6 L 8 10 L 22 12 Z" fill="#C06844" stroke="#2E2A24" stroke-width="1.5"/>
    <!-- nib -->
    <path d="M 8 2 L -14 6 L 8 10 Z" fill="#C4A768" stroke="#2E2A24" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="4" y2="6" stroke="#2E2A24" stroke-width="1.3"/>
    <!-- breather hole -->
    <circle cx="2" cy="6" r="1.2" fill="#2E2A24"/>
    <!-- tiny ink blot on desk just ahead of nib -->
    <circle cx="-22" cy="8" r="2.4" fill="#2E2A24" opacity="0.85"/>
    <circle cx="-26" cy="11" r="0.9" fill="#2E2A24" opacity="0.6"/>
  </g>
</svg>
